name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  lint:
    runs-on: [self-hosted, macOS, ARM64, apple-silicon, m4]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        run: |
          brew install python@3.12 2>/dev/null || true
          /opt/homebrew/bin/python3.12 -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
      - name: Install dependencies
        run: |
          pip install --upgrade pip poetry
          poetry install --no-interaction
      - name: Ruff lint
        run: poetry run ruff check core/ plugins/ tests/
      - name: Pyright type check
        run: poetry run pyright core/ plugins/

  test:
    runs-on: [self-hosted, macOS, ARM64, apple-silicon, m4]
    strategy:
      matrix:
        plugin: [expert, generic, guidance, openai-assistant, ingest-website, ingest-space]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        run: |
          brew install python@3.12 2>/dev/null || true
          /opt/homebrew/bin/python3.12 -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
      - name: Install dependencies
        run: |
          pip install --upgrade pip poetry
          poetry install --no-interaction
      - name: Run tests
        run: |
          poetry run pytest tests/ \
            --cov=core --cov=plugins \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v
