name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

env:
  AGENT_TOOLSDIRECTORY: /Users/m1/actions-tool-cache
  RUNNER_TOOL_CACHE: /Users/m1/actions-tool-cache

jobs:
  lint:
    runs-on: [self-hosted, macOS, ARM64, apple-silicon, m4]
    steps:
      - uses: actions/checkout@v4
      - name: Ensure tool cache exists
        run: mkdir -p "$AGENT_TOOLSDIRECTORY"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip poetry
          poetry install --no-interaction
      - name: Ruff lint
        run: poetry run ruff check core/ plugins/ tests/
      - name: Pyright type check
        run: poetry run pyright core/ plugins/

  test:
    runs-on: [self-hosted, macOS, ARM64, apple-silicon, m4]
    strategy:
      matrix:
        plugin: [expert, generic, guidance, openai-assistant, ingest-website, ingest-space]
    steps:
      - uses: actions/checkout@v4
      - name: Ensure tool cache exists
        run: mkdir -p "$AGENT_TOOLSDIRECTORY"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip poetry
          poetry install --no-interaction
      - name: Run tests
        run: |
          poetry run pytest tests/ \
            --cov=core --cov=plugins \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v
