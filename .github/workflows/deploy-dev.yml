name: Deploy Dev

on:
  workflow_run:
    workflows: [Build & Push]
    types: [completed]
    branches: [develop]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin: [expert, generic, guidance, openai-assistant, ingest-website, ingest-space]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy ${{ matrix.plugin }}
        run: |
          echo "Deploying ${{ matrix.plugin }} to dev environment"
